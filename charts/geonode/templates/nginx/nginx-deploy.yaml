apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ include "nginx_pod_name" . }}"
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      org.geonode.instance: "{{ include "nginx_pod_name" . }}"
  replicas: {{ .Values.nginx.replicaCount }}
  template:
    metadata:
      labels:
        org.geonode.instance: "{{ include "nginx_pod_name" . }}"
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/nginx/nginx-conf.yaml") . | sha256sum }}
    spec:
      terminationGracePeriodSeconds: 3
{{- if not (empty .Values.nginx.imagePullSecret) }}
      imagePullSecrets:
      - name: {{ .Values.nginx.imagePullSecret }}
{{ end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ (default dict .Values.nginx.securityContext).runAsUser | default 101 }}
        fsGroup: {{ (default dict .Values.nginx.securityContext).fsGroup | default .Values.global.securityContext.fsGroup }}
      containers:
      - name: {{ .Values.nginx.container_name }}
        image: "{{ .Values.nginx.image.name }}:{{ .Values.nginx.image.tag }}"
        imagePullPolicy: {{ .Values.nginx.imagePullPolicy }}
        ports:
          - name: http
            containerPort: 8080
        securityContext:
          runAsUser: {{ .Values.nginx.securityContext.runAsUser | default 101 }}
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: pvc-statics
          mountPath: /mnt/volumes/statics
        - name: nginx-confd
          mountPath: /etc/nginx/conf.d
        # Writable scratch directories for nginx
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        - name: nginx-tmp
          mountPath: /tmp
        livenessProbe:
          {{- toYaml $.Values.nginx.livenessProbe | nindent 10 }}
        resources:
          {{- toYaml $.Values.nginx.resources | nindent 10 }}
      volumes:
      - name: nginx-confd
        configMap:
          name: {{ .Release.Name }}-nginx-confd
      - name: pvc-statics
        persistentVolumeClaim:
          claimName: {{ include "pvc_statics_name" . }}
      # emptyDir for all nginx scratch directories
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      - name: nginx-tmp
        emptyDir: {}
