apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ include "nginx_pod_name" . }}"
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      org.geonode.instance: "{{ include "nginx_pod_name" . }}"
  replicas: {{ .Values.nginx.replicaCount }}
  template:
    metadata:
      labels:
        org.geonode.instance: "{{ include "nginx_pod_name" . }}"
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/nginx/nginx-conf.yaml") . | sha256sum }}
    spec:
      {{- include "geonode.colocation_affinity" . | nindent 6 }}
      terminationGracePeriodSeconds: 3
{{- if not (empty .Values.nginx.imagePullSecret) }}
      imagePullSecrets:
      - name: {{ .Values.nginx.imagePullSecret }}
{{ end }}
{{- $ngxctx := default dict .Values.nginx.securityContext }}
      securityContext:
        runAsNonRoot: true
        fsGroup: {{- if hasKey $ngxctx "fsGroup" }} {{ $ngxctx.fsGroup }} {{- else }} {{ .Values.global.securityContext.fsGroup }} {{- end }}
      containers:
      - name: {{ .Values.nginx.container_name }}
        image: "{{ .Values.nginx.image.name }}:{{ .Values.nginx.image.tag }}"
        imagePullPolicy: {{ .Values.nginx.imagePullPolicy }}
        ports:
          - name: http
            containerPort: 8080
        securityContext:
          runAsUser: {{- if hasKey $ngxctx "runAsUser" }} {{ $ngxctx.runAsUser }} {{- else }} 101 {{- end }}
          runAsGroup: {{- if hasKey $ngxctx "runAsGroup" }} {{ $ngxctx.runAsGroup }} {{- else }} {{ .Values.global.securityContext.runAsGroup }} {{- end }}
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: pvc-statics
          mountPath: /mnt/volumes/statics
          readOnly: true
        - name: nginx-confd
          mountPath: /etc/nginx/conf.d
        # Writable scratch directories for nginx
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        - name: nginx-tmp
          mountPath: /tmp
        livenessProbe:
          {{- toYaml $.Values.nginx.livenessProbe | nindent 10 }}
        resources:
          {{- toYaml $.Values.nginx.resources | nindent 10 }}
      volumes:
      - name: nginx-confd
        configMap:
          name: {{ .Release.Name }}-nginx-confd
      - name: pvc-statics
        persistentVolumeClaim:
          claimName: {{ include "pvc_statics_name" . }}
      # emptyDir for all nginx scratch directories
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      - name: nginx-tmp
        emptyDir: {}
