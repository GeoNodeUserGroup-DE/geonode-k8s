{{- if .Values.geonode.hooks.cleanupOnUpgrade }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ include "geonode_pod_name" . }}-cleanup"
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "{{ include "geonode_pod_name" . }}-cleanup"
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-10"
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ include "geonode_pod_name" . }}-cleanup"
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-10"
subjects:
- kind: ServiceAccount
  name: "{{ include "geonode_pod_name" . }}-cleanup"
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: "{{ include "geonode_pod_name" . }}-cleanup"
  apiGroup: rbac.authorization.k8s.io
{{- end }}
