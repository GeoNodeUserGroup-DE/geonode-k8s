# check if postgres.type is set to external operator
{{ $is_operator := (eq .Values.postgres.type "operator") }}
{{ $is_external := (eq .Values.postgres.type "external") }}
{{ if not (or $is_operator  $is_external) }}
  {{- fail "Deploymnent FAILED, unknown postgres.type defined, please set postgres.type to operator or external ..." }}
{{ end }}

apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "geonode_pod_name" . }}-statics-job"
  namespace: {{ .Release.Namespace }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        org.geonode.instance: "{{ include "geonode_pod_name" . }}-statics-job"
    spec:
{{- if not (empty .Values.geonode.imagePullSecret) }}
      imagePullSecrets:
      - name: {{ .Values.geonode.imagePullSecret }}
{{ end }}
      restartPolicy: OnFailure
{{- $gnctx := default dict .Values.geonode.securityContext }}
      securityContext:
        runAsNonRoot: true
        fsGroup: {{- if hasKey $gnctx "fsGroup" }} {{ $gnctx.fsGroup }} {{- else }} {{ .Values.global.securityContext.fsGroup }} {{- end }}

      containers:
      - name: {{ .Values.geonode.container_name }}-statics-job
        image: "{{ .Values.geonode.image.name }}:{{ .Values.geonode.image.tag }}"
        imagePullPolicy: {{ .Values.geonode.imagePullPolicy }}
        securityContext:
          runAsUser: {{- if hasKey $gnctx "runAsUser" }} {{ $gnctx.runAsUser }} {{- else }} {{ .Values.global.securityContext.runAsUser }} {{- end }}
          runAsGroup: {{- if hasKey $gnctx "runAsGroup" }} {{ $gnctx.runAsGroup }} {{- else }} {{ .Values.global.securityContext.runAsGroup }} {{- end }}
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

        command:
        - bash
        - -c
        - |
          set -e
          cd {{ include "geonode_root_path" .}}/

          echo "-----------------------------------------------------"
          echo "Starting GeoNode static tasks (migrations) $(date)"
          echo "-----------------------------------------------------"
          invoke initialized
          invoke statics
          if [ -f /favicon/favicon.ico ]; then
            echo "Installing custom favicon"
            install -D -m 0644 \
              /favicon/favicon.ico \
              /mnt/volumes/statics/static/geonode/img/favicon.ico
          fi
          echo "-----------------------------------------------------"
          echo "GeoNode static tasks done $(date)"
          echo "-----------------------------------------------------"
{{- if .Values.geonode.mapstore.nominatim_patch.enabled }}
          echo "-----------------------------------------------------"
          echo "Applying Mapstore Nominatim patch $(date)"
          echo "-----------------------------------------------------"
          python3 /usr/src/geonode/mapstore_nominatim_patch.py
          echo "-----------------------------------------------------"
          echo "Mapstore Nominatim patch done $(date)"
          echo "-----------------------------------------------------"
{{- end }}
        envFrom:
        - configMapRef:
            name: {{ include "geonode_pod_name" . }}-env
        - secretRef:
            name: {{ .Values.geonode.secret.existingSecretName | default (include "geonode_secret_name" .) | quote }}
        - secretRef:
            name: {{ .Values.geoserver.secret.existingSecretName | default (include "geoserver_secret_name" .) | quote }}
        env:
        - name: GEONODE_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "database_geonode_password_secret_key_ref" . }}
              key: {{ include "database_geonode_password_key_ref" . }}
        - name: GEONODE_GEODATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "database_geodata_password_secret_key_ref" . }}
              key: {{ include "database_geodata_password_key_ref" . }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "database_postgres_password_secret_key_ref" . }}
              key: {{ include "database_postgres_password_key_ref" . }}
        - name: GEODATABASE_URL
          value: "postgis://$(GEONODE_GEODATABASE):$(GEONODE_GEODATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(GEONODE_GEODATABASE)"
        - name: DATABASE_URL
          value: "postgis://$(GEONODE_DATABASE):$(GEONODE_DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(GEONODE_DATABASE)"
        - name: PYTHONPATH
          value: /opt/geonode-custom
        volumeMounts:
        - name: cache-volume
          mountPath: /tmp
        - name: tasks-py
          mountPath: "{{ include "geonode_root_path" .}}/tasks.py"
          subPath: tasks.py
          readOnly: true
        - name: settings-wrapper
          mountPath: /opt/geonode-custom/settings_wrapper.py
          subPath: settings_wrapper.py
          readOnly: true
        - name: settings-additions
          mountPath: /opt/geonode-custom/settings_additions.py
          subPath: settings_additions.py
          readOnly: true
{{- if .Values.geonode.mapstore.nominatim_patch.enabled }}
        - name: mapstore-nominatim-patch-py
          mountPath: /usr/src/geonode/mapstore_nominatim_patch.py
          subPath: mapstore_nominatim_patch.py
          readOnly: true
{{- end }}
        - name: pvc-statics
          mountPath: /mnt/volumes/statics
{{- if .Values.favicon }}
        - name: favicon
          mountPath: /favicon
          readOnly: true
{{- end }}
      volumes:
      - name: pvc-statics
        persistentVolumeClaim:
          claimName: {{ include "pvc_statics_name" . }}
      - name: tasks-py
        configMap:
          name: {{ .Release.Name }}-geonode-tasks-py
          items:
          - key: tasks.py
            path: "tasks.py"
      - name: settings-wrapper
        configMap:
          name: {{ .Release.Name }}-geonode-settings-wrapper
          defaultMode: 0555
      - name: settings-additions
        configMap:
          name: {{ .Release.Name }}-geonode-settings-additions
          defaultMode: 0555
{{- if .Values.geonode.mapstore.nominatim_patch.enabled }}
      - name: mapstore-nominatim-patch-py
        configMap:
          name: "{{ include "geonode_pod_name" . }}-mapstore-nominatim-patch"
{{- end }}
{{- if .Values.favicon }}
      - name: favicon
        configMap:
          name: {{ .Release.Name }}-geonode-favicon
{{- end }}
      # Using an emptyDir to cache compiled statics... it will survive container crashes, but not pod restarts
      - name: cache-volume
        emptyDir: {}
