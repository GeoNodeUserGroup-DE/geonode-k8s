        contact_fax=+xx-xxx-xxx-xxxx
        contact_email=Email Address
        contact_url=Contact URL
        contact_hours=Hours of Service
        contact_instructions=During hours of service.  Off on weekends.
        contact_role=pointOfContact
    [repository]
        database=${PYCSW_REPOSITORY_DATABASE_URI}
        mappings=/etc/pycsw/pycsw-mappings.py
        table=base_resourcebase
    [metadata:inspire]
        enabled="true"
        languages_supported=eng,gre
        default_language=eng
        date=YYYY-MM-DD
        gemet_keywords=Utility and governmental services
        conformity_service=notEvaluated
        contact_name=Organization Name
        contact_email=Email Address
        temp_extent=YYYY-MM-DD/YYYY-MM-DD

# MEMCACHED CONFIGURATION
# https://artifacthub.io/packages/helm/cloudpirates-memcached/memcached
memcached:
  enabled: true
  # Basic installation
  replicaCount: 1
  containerSecurityContext:
    # Use memcached typical userid for runtime
    runAsUser: 11211
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  config:
    memoryLimit: 128
    maxConnections: 2048

  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
# RABBITMQ CONFIGURATION
# https://artifacthub.io/packages/helm/cloudpirates-rabbitmq/rabbitmq
# Activate if you are running geonode below 5.0.0
rabbitmq:
  enabled: false

  # -- rabbitmq raplica count
  persistence:
    enabled: true
    size: 2Gi

  requests:
    # -- requested memory as in resource.requests.memory (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
    memory: "1Gi"
    # -- requested cpu as in resource.requests.cpu (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
    cpu: "500m"
  limits:
    # -- limits memory as in resource.limits.memory (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
    memory: "1Gi"
    # -- limit cpu as in resource.requests.cpu (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
    cpu: "750m"

  auth:
    enabled: true
    username: rabbituser
    # -- RabbitMQ password. **WARNING: Change this for production deployments!** The default value is insecure.
    password: rabbitpassword

  config:
    memoryHighWatermark:
      enabled: true
      type: "relative"
      value: 0.5

  ingress:
    enabled: False

# REDIS CONFIGURATION
# https://artifacthub.io/packages/helm/cloudpirates-redis/redis/0.19.0

redis:
  # -- enable redis deployment
  enabled: True
  # -- Redis architecture. standalone: Single instance, cluster: Multi-master cluster, replication: Master-replica (use sentinel.enabled to control automatic failover)
  architecture: standalone
  # -- redis container replicas
  replicaCount: 1
  auth:
    # -- Enable Redis authentication
    enabled: True
    # -- Redis password. **WARNING: Change this for production deployments!** The default value is insecure.
    password: redispassword
  # -- Redis Sentinel provides high availability for Redis through automatic failover. When enabled in replication mode, Sentinel monitors the master and replicas, and promotes a replica to master if the current master becomes unavailable. When disabled with replication mode, pod-0 is always the master.
  sentinel:
    # -- Enable Redis Sentinel for high availability. When disabled, pod-0 is master (manual failover)
    enabled: False

  resources:
    requests:
      # -- requested memory as in resource.requests.memory (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
      memory: "256Mi"
      # -- requested cpu as in resource.requests.cpu (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
      cpu: "100m"
    limits:
      # -- limits memory as in resource.limits.memory (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
      memory: "512Mi"
      # -- limit cpu as in resource.requests.cpu (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
      cpu: "200m"

postgres:
  # -- type of used postgres: "operator" or "external". \
  # if external is used, host, port and password have to be set in postgres.external using values or external secret
  # if operator is used, host port and passwords get set automatically using postgres-operator. If your Kubernetes cluster
  # does not have a running postgres-operator, you can install the postgres-operator with  postgres-operator.enabled = true
  type: operator
  # -- postgres username
  username: postgres
  # -- database schema
  schema: public
  # -- geonode database name and username
  geonode_databasename_and_username: geonode
  # -- geoserver database name and username
  geodata_databasename_and_username: geodata

  # configuration for postgres operator database manifest (https://github.com/zalando/postgres-operator/blob/master/docs/reference/cluster_manifest.md)
  operator:
    # -- pod name for postgres containers == teamID for mainifest
    pod_name: postgresql
    # -- Database storage size
    storageSize: 3Gi
    # -- postgress pv storageclass
    storageClass:
    # -- number of database instances
    numberOfInstances: 1
    # -- postgres version
    postgres_version: 15
    # -- boolean flag to override the operator defaults (set by the enable_master_load_balancer parameter) to define whether to enable the load balancer pointing to the Postgres primary. Optional.
    enableMasterLoadBalancer:
    # -- when one or more load balancers are enabled for the cluster, this parameter defines the comma-separated range of IP networks (in CIDR-notation).
    # The corresponding load balancer is accessible only to the networks defined by this parameter.
    # Optional, when empty the load balancer service becomes inaccessible from outside of the Kubernetes cluster.
    allowedSourceRanges: []
    # -- a dictionary of environment variables. Use usual Kubernetes definition (https://kubernetes.io/docs/tasks/inject-data-application/environment-variable-expose-pod-information/)
    # for environment variables. Optional.
    env: []
    # -- additional annotation for postgresql object
    annotations: {}
    # -- patroni related configuration (https://patroni.readthedocs.io/en/master/patroni_configuration.html)
    patroni: {}
    # -- postgres parameters resources
    parameters:
      max_connections: "20"
      shared_buffers: 250MB
      work_mem: 12.5Mb
    # --
    clone: {}
    # -- Those parameters define CPU and memory requests and limits for the Postgres container. They are grouped under the resources top-level key with subgroups requests and limits
    resources:
      requests:
        # -- requested memory as in resource.requests.memory (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
        memory: "0.5Gi"
        # -- requested cpu as in resource.requests.cpu (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
        cpu: "100m"
      limits:
        # -- limits memory as in resource.limits.memory (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
        memory: "1Gi"
        # -- limit cpu as in resource.requests.cpu (https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
        cpu: "400m"

  external:
    hostname: my-external-postgres.com
    port: 5432
    ssl: prefer
    secret:
      # -- name of an existing Secret to use. Set, if you want to separately maintain the Secret.
      existingSecretName: ""
      postgres_password: postgres
      geonode_password: geonode
      geodata_password: geogeonode

# VALUES DEFINITION: https://github.com/zalando/postgres-operator/blob/master/charts/postgres-operator/values.yaml
postgres-operator:
  # -- enable postgres-operator (this or postgresql.enabled NOT both )
  enabled: False
  # -- ???
  operatorApiUrl: "http://{{ .Release.Name }}-postgres-operator:8080"
  configLoggingRestApi:
    # --  REST API listener listens to this port
    api_port: 8080
  # -- not setting the podServiceAccount name will leed to generation of this name. This allows to run multiple postgres-operators in a single kubernetes cluster. just seperating them by namespace.
  podServiceAccount:
    name: ""
  # Override securityContext of subchart
  securityContext:
    runAsUser: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  configKubernetes:
    spilo_runasuser: 101
    spilo_runasgroup: 103
    spilo_fsgroup: 103
    spilo_privileged: false
    spilo_allow_privilege_escalation: false
# -- (map of fixture files) Fixture files which shall be made available under /usr/src/geonode/geonode/fixtures (refer to https://docs.djangoproject.com/en/4.2/howto/initial-data/)
